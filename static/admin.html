<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Grid Scout — Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f0d; color: #e2e8f0; font-family: system-ui; }
        .card { background: #1a2332; border: 1px solid #2d3748; border-radius: 12px; padding: 24px; }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: #4ade80; }
        .stat-label { font-size: 0.875rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #94a3b8; border-bottom: 1px solid #2d3748; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 0.875rem; }
        .badge { padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge-free { background: #374151; color: #9ca3af; }
        .badge-scout { background: #1e3a5f; color: #60a5fa; }
        .badge-pioneer { background: #3b1f6e; color: #a78bfa; }
        .badge-lifetime { background: #1a4731; color: #4ade80; }
        .refresh-btn { background: #4ade80; color: #0a0f0d; padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .refresh-btn:hover { background: #22c55e; }
        #loading { display: none; color: #4ade80; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold">&#9881; Admin Dashboard</h1>
                <p class="text-slate-400 mt-1">Off-Grid Scout &mdash; Business Metrics</p>
            </div>
            <div class="flex items-center gap-4">
                <span id="loading">Refreshing...</span>
                <span id="last-updated" class="text-sm text-slate-500"></span>
                <button class="refresh-btn" onclick="loadDashboard()">&#8635; Refresh</button>
            </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card"><div class="stat-label">Total Users</div><div class="stat-value" id="total-users">&mdash;</div></div>
            <div class="card"><div class="stat-label">Paid Users</div><div class="stat-value" id="paid-users">&mdash;</div></div>
            <div class="card"><div class="stat-label">Waitlist</div><div class="stat-value" id="waitlist">&mdash;</div></div>
            <div class="card"><div class="stat-label">Revenue</div><div class="stat-value" id="revenue">&mdash;</div></div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card"><div class="stat-label">Scans Today</div><div class="stat-value" id="scans-today">&mdash;</div></div>
            <div class="card"><div class="stat-label">Total Scans</div><div class="stat-value" id="scans-total">&mdash;</div></div>
            <div class="card"><div class="stat-label">Conversion Rate</div><div class="stat-value" id="conversion">&mdash;</div></div>
            <div class="card"><div class="stat-label">Avg Scans/User</div><div class="stat-value" id="avg-scans">&mdash;</div></div>
        </div>
        <div class="card mb-8">
            <h2 class="text-xl font-bold mb-4">Tier Breakdown</h2>
            <div class="grid grid-cols-4 gap-4" id="tier-bars"></div>
        </div>
        <div class="card">
            <h2 class="text-xl font-bold mb-4">Recent Scans</h2>
            <div style="overflow-x:auto">
                <table>
                    <thead><tr><th>Time</th><th>User</th><th>URL</th><th>Score</th><th>Tier</th></tr></thead>
                    <tbody id="scans-table"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
    const ADMIN_KEY = localStorage.getItem("admin_key") || prompt("Enter admin API key:");
    if (ADMIN_KEY) localStorage.setItem("admin_key", ADMIN_KEY);

    async function loadDashboard() {
        document.getElementById("loading").style.display = "inline";
        try {
            const res = await fetch("/admin/dashboard", {headers: {"X-Admin-Key": ADMIN_KEY}});
            if (!res.ok) { alert("Unauthorized or error"); return; }
            const data = await res.json();
            document.getElementById("total-users").textContent = data.stats.total_users;
            document.getElementById("paid-users").textContent = data.stats.paid_users;
            document.getElementById("waitlist").textContent = data.stats.waitlist;
            document.getElementById("revenue").textContent = "£" + (data.stats.total_revenue_pence / 100).toFixed(2);
            document.getElementById("scans-today").textContent = data.stats.scans_today;
            document.getElementById("scans-total").textContent = data.stats.scans_total;
            const conv = data.stats.total_users > 0 ? ((data.stats.paid_users / data.stats.total_users) * 100).toFixed(1) + "%" : "—";
            document.getElementById("conversion").textContent = conv;
            const avg = data.stats.total_users > 0 ? (data.stats.scans_total / data.stats.total_users).toFixed(1) : "—";
            document.getElementById("avg-scans").textContent = avg;
            const tierDiv = document.getElementById("tier-bars");
            tierDiv.innerHTML = "";
            const tiers = data.stats.tiers || {};
            ["free","scout","pioneer","lifetime"].forEach(t => {
                tierDiv.innerHTML += '<div class="text-center"><div class="text-2xl font-bold">'+(tiers[t]||0)+'</div><span class="badge badge-'+t+'">'+t+'</span></div>';
            });
            const tbody = document.getElementById("scans-table");
            tbody.innerHTML = "";
            (data.recent_scans || []).forEach(s => {
                const time = new Date(s.scanned_at).toLocaleString();
                const url = s.url ? '<a href="'+s.url+'" target="_blank" class="text-green-400 hover:underline">'+s.url.substring(0,40)+'...</a>' : "—";
                tbody.innerHTML += '<tr><td>'+time+'</td><td>'+(s.email||"—")+'</td><td>'+url+'</td><td>'+(s.score||"—")+'</td><td><span class="badge badge-'+(s.tier||"free")+'">'+(s.tier||"free")+'</span></td></tr>';
            });
            document.getElementById("last-updated").textContent = "Updated: " + new Date().toLocaleTimeString();
        } catch(e) { console.error(e); }
        finally { document.getElementById("loading").style.display = "none"; }
    }
    loadDashboard();
    setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
